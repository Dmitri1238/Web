<!-- templates/course_video.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Курс: {{ course_name }}</title>
<link rel="stylesheet" href="/static/css/auth.css" />
<style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    #videoContainer { display: none; position: relative; width: 80%; margin: 20px auto; }
    #fakeVideo { width: 100%; height: 400px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    #notification { margin-top: 20px; font-weight: bold; }
    #videoButton { margin-top: 10px; padding: 10px 20px; font-size: 16px; }
</style>
</head>
<header>
    <div class="header-top">
        <h1>Мой книжный магазин</h1>
        <nav>
            <ul>
                <li><a href="/">Главная</a></li>
                <li><a href="/catalog/">Каталог</a></li>
                <li><a href="/courses">Курсы</a></li>
            </ul>
        </nav>
        <div class="cart-info"></div>
    </div>
</header>
<body>

<h2>Курс: {{ course_name }}</h2>

<div id="videoContainer">
    <div id="fakeVideo">🚀 Видео курса ― тут будет видео 🎬</div>
    <button id="videoButton" onclick="toggleVideo()">Смотреть курс</button>
</div>

<div id="notification"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const startTimeStr = localStorage.getItem('course_time') || "{{ course_time_start|escapejs }}"; // например, "23:00"
    const durationHours = 2; // длительность интервала, измените по необходимости
    let isVideoPlaying = false;
    let canShowButton = false;
    const notificationElem = document.getElementById('notification');
    const videoContainer = document.getElementById('videoContainer');
    const viewButton = document.getElementById('videoButton');
    const fakeVideo = document.getElementById('fakeVideo');

    function checkTime() {
        const now = new Date();
        console.log('Текущий время:', now);

        // Получаем сохраненное время
        const savedTimeStr = localStorage.getItem('course_time');
        console.log('Сохраненное время курса из localStorage:', savedTimeStr);

        if (!savedTimeStr) {
            console.log('Нет сохраненного времени курса.');
            notificationElem.textContent = 'Не выбрано время курса.';
            videoContainer.style.display = 'none';
            if (viewButton) viewButton.style.display = 'none';
            canShowButton = false;
            return;
        }

        const [sh, sm] = savedTimeStr.split(':').map(Number);
        console.log(`Планируемая дата начала: ${sh}:${sm}`);

        // Определяем дату начала сегодня
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), sh, sm);
        const end = new Date(start.getTime() + durationHours * 60 * 60 * 1000);
        console.log('Время начала курса:', start);
        console.log('Время окончания курса:', end);

        // Если текущая дата меньше start, значит ещё не время
        if (now < start) {
            console.log('Еще не наступило время курса.');
            notificationElem.textContent = 'Этот курс еще не начался.';
            videoContainer.style.display = 'none';
            if (viewButton) viewButton.style.display = 'none';
            canShowButton = false;
            return;
        }

        // Если текущая дата больше end, значит курс прошел
        if (now >= end) {
            console.log('Время курса уже прошло.');
            notificationElem.textContent = 'Этот курс уже прошел.';
            videoContainer.style.display = 'none';
            if (viewButton) viewButton.style.display = 'none';
            canShowButton = false;
            return;
        }

        // Проверяем, есть ли стартовое время запуска видео
        const storedTime = localStorage.getItem('videoStartTime');
        console.log('Стартовое время видео из localStorage:', storedTime);

        if (storedTime) {
            const startTS = parseInt(storedTime);
            console.log('Текущий таймстамп старта видео:', startTS);
            // Проверка, что текущее время не раньше стартового
            if (now.getTime() < startTS) {
                console.log('Не время запускать видео ещё.');
                notificationElem.textContent = 'Подождите, запуск видео возможен только в назначенное время.';
                if (viewButton) viewButton.style.display = 'none';
                canShowButton = false;
                return;
            }
            // Проверка, не истекло ли время просмотра
            const elapsed = now.getTime() - startTS;
            console.log('Прошло с момента запуска видео, мс:', elapsed);
            if (elapsed > durationHours * 60 * 60 * 1000) {
                console.log('Время просмотра истекло.');
                alert('Время просмотра этого видео истекло.');
                localStorage.removeItem('videoStartTime');
                fakeVideo.textContent = '🚀 Видео курса ― тут будет видео 🎬';
                if (viewButton) viewButton.style.display = 'none';
                canShowButton = false;
                return;
            }
        } else {
            console.log('Нет сохраненного времени запуска видео, можно запускать.');
        }

        // Всё в порядке, можем показывать кнопку
        if (viewButton) {
            viewButton.style.display = 'inline-block';
            console.log('Показываем кнопку для просмотра видео.');
        }
        notificationElem.textContent = '';
        canShowButton = true;
    }

    // Проверка каждые 30 секунд
    setInterval(checkTime, 30000);
    checkTime(); // немедленная проверка при загрузке
});
</script>

</body>
</html>
