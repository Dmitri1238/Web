<!-- main/literature.html -->
{% load static %}
{% load utils %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Литература</title>
    <link rel="stylesheet" href="{% static 'css/aut.css' %}">
    <link rel="stylesheet" href="{% static 'css/books.css' %}">
    
</head>
<body>

<!-- Навигация -->
<header>
    <div class="header-top">
        <h1>Мой книжный магазин</h1>
        <nav>
            <ul>
                <li><a href="/">Главная</a></li>
                <li><a href="/catalog/">Каталог</a></li>
                <li><a href="/courses/">Курсы</a></li>
                <li><a href="/about/">О нас</a></li>
            </ul>
        </nav>
        <div class="cart-info">
            <a href="/cart/">В корзине: <span id="cart-count">{{ request.session.cart|sum_dict_values }}</span> товаров</a>
        </div>
    </div>
</header>

<div class="books-container">
    {% for book in books %}
        {% include 'main/book_card.html' with book=book %}
    {% endfor %}
</div>

</body>
</html>
